# ---- Internal-bleed clamp + close ------------------------------------

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryCauterizeInternalBleeding
  name: Stop Internal Bleeding
  components:
  - type: CMSurgery
    priority: 7
    requirement: CMUSurgeryOpenSoftTissue
    steps:
    - CMUSurgeryStepCauterizeBleed
    - CMUSurgeryStepCloseIncision

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryCauterizeInternalBleedingCavity
