# ---- Access / closure primitives ------------------------------------

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryOpenSoftTissue
  name: Open Incision
  components:
  - type: CMSurgery
    steps:
    - CMSurgeryStepOpenIncisionScalpel
    - CMSurgeryStepClampBleeders
    - CMSurgeryStepRetractSkin

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryOpenBoneCavity
  name: Open Bone Cavity
  components:
  - type: CMSurgery
    requirement: CMUSurgeryOpenSoftTissue
    steps:
    - CMSurgeryStepSawBones
    - CMSurgeryStepPriseOpenBones

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryCloseIncision
  name: Close Incision
  components:
  - type: CMSurgery
    priority: 1
    steps:
    - CMUSurgeryStepCloseIncision

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgeryCloseBoneCavity
  name: Close Bone Cavity
  components:
  - type: CMSurgery
    priority: 1
    steps:
    - CMSurgeryStepCloseBones
    - CMSurgeryStepMendRibcage
    - CMUSurgeryStepCloseIncision

# ---- Bone setting ----------------------------------------------------

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgerySetSimpleFracture
  name: Set Simple Fracture
  components:
  - type: CMSurgery
    priority: 10
    requirement: CMUSurgeryOpenSoftTissue
    steps:
    - CMUSurgeryStepSetSimpleBone
    - CMUSurgeryStepApplyBoneGel
    - CMUSurgeryStepCloseIncision
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Simple

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgerySetSimpleFractureCavity
  name: Set Simple Fracture
  components:
  - type: CMSurgery
    priority: 10
    requirement: CMUSurgeryOpenBoneCavity
    steps:
    - CMUSurgeryStepSetSimpleBone
    - CMUSurgeryStepApplyBoneGel
    - CMSurgeryStepCloseBones
    - CMSurgeryStepMendRibcage
    - CMUSurgeryStepCloseIncision
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Simple

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgerySetCompoundFracture
  name: Set Compound Fracture
  components:
  - type: CMSurgery
    priority: 8
    requirement: CMUSurgeryOpenSoftTissue
    steps:
    - CMUSurgeryStepRealignCompoundBone
    - CMUSurgeryStepApplyBoneGel
    - CMUSurgeryStepCloseIncision
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Compound

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgerySetCompoundFractureCavity
  name: Set Compound Fracture
  components:
  - type: CMSurgery
    priority: 8
    requirement: CMUSurgeryOpenBoneCavity
    steps:
    - CMUSurgeryStepRealignCompoundBone
    - CMUSurgeryStepApplyBoneGel
    - CMSurgeryStepCloseBones
    - CMSurgeryStepMendRibcage
    - CMUSurgeryStepCloseIncision
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Compound

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgerySetComminutedFracture
  name: Set Shattered Fracture
  components:
  - type: CMSurgery
    priority: 7
    requirement: CMUSurgeryOpenSoftTissue
    steps:
    - CMUSurgeryStepRealignComminutedBone
    - CMUSurgeryStepApplyComminutedBoneGel
    - CMUSurgeryStepInsertBoneGraft
    - CMUSurgeryStepFinalizeGraftedBone
    - CMUSurgeryStepCloseIncision
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Shattered

- type: entity
  parent: CMSurgeryBase
  id: CMUSurgerySetComminutedFractureCavity
  name: Set Shattered Fracture
  components:
  - type: CMSurgery
    priority: 7
    requirement: CMUSurgeryOpenBoneCavity
    steps:
    - CMUSurgeryStepRealignComminutedBone
    - CMUSurgeryStepApplyComminutedBoneGel
    - CMUSurgeryStepInsertBoneGraft
    - CMUSurgeryStepFinalizeGraftedBone
    - CMSurgeryStepCloseBones
    - CMSurgeryStepMendRibcage
    - CMUSurgeryStepCloseIncision
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Shattered

