# ---- Bone-setting steps ----------------------------------------------

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepSetSimpleBone
  name: Realign simple fracture
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMBoneSetter
    add:
    - type: CMUBoneAlignedMarker
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Simple
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bonesetter.rsi
    state: bonesetter

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepRealignCompoundBone
  name: Realign compound fracture
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMBoneSetter
    add:
    - type: CMUBoneAlignedMarker
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Compound
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Compound
    downgradeTo: Simple
    integrityRestore: 40
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bonesetter.rsi
    state: bonesetter

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepApplyBoneGel
  name: Apply bone gel
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMBoneGel
    remove:
    - type: CMUBoneAlignedMarker
  - type: CMUFracturedSurgeryCondition
    requireAtLeast: Simple
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Simple
    downgradeTo: None
    integrityRestore: 60
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bone_gel.rsi
    state: bone-gel

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepRealignComminutedBone
  name: Realign shattered fracture
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMBoneSetter
    add:
    - type: CMUComminutedBoneRealignedMarker
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Shattered
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Shattered
    downgradeTo: Compound
    integrityRestore: 25
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bonesetter.rsi
    state: bonesetter

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepApplyComminutedBoneGel
  name: Apply bone gel
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMBoneGel
    add:
    - type: CMUComminutedBoneGelAppliedMarker
    remove:
    - type: CMUComminutedBoneRealignedMarker
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Compound
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bone_gel.rsi
    state: bone-gel

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepInsertBoneGraft
  name: Insert bone graft
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMUBoneGraft
    add:
    - type: CMUBoneAlignedMarker
    remove:
    - type: CMUComminutedBoneGelAppliedMarker
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Compound
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Compound
    downgradeTo: Simple
    integrityRestore: 40
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bone_gel.rsi
    state: bone-gel

- type: entity
  parent: CMSurgeryStepBase
  id: CMUSurgeryStepFinalizeGraftedBone
  name: Final set grafted bone
  components:
  - type: CMSurgeryStep
    skill: 1
    tool:
    - type: CMBoneSetter
    remove:
    - type: CMUBoneAlignedMarker
  - type: CMUFracturedSurgeryCondition
    requireSeverity: Simple
  - type: CMUSurgeryStepSetBoneEffect
    downgradeFrom: Simple
    downgradeTo: None
    integrityRestore: 70
  - type: Sprite
    sprite: _RMC14/Objects/Medical/Surgery/bonesetter.rsi
    state: bonesetter

