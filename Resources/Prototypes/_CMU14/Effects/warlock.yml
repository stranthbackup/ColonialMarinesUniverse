      sprite: _RMC14/Effects/beam.rsi
      state: laser_beam
      drawdepth: Effects
      color: "#970f0f"
    - type: ProjectileMaxRange
      max: 7
      delete: false
    - type: RMCProjectileAccuracy
      accuracy: 999
    - type: CMUXenoPsychicBlastProjectile
      mode: Blast
      radius: 1.25
      damage:
        types:
          Blunt: 55
      slow: 1.5
      impactSound:
        path: /Audio/_CMU14/Xeno/Warlock/EMPulse.ogg
      impactEffectId: CMUXenoPsychicBlastShockwave
