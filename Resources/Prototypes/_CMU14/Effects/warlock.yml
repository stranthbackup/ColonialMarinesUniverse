- type: entity
  id: CMUXenoPsychicShieldSegment
  categories: [HideSpawnMenu]
  name: psychic shield
  components:
    - type: Physics
      bodyType: Static
    - type: Fixtures
      fixtures:
        shield:
          shape: !type:PolygonShape
            vertices:
              - "-1.5,-0.5"
              - "1.5,-0.5"
              - "1.5,0.5"
              - "-1.5,0.5"
          hard: true
          layer:
            - BulletImpassable
    - type: CMUXenoPsychicShieldSegment
    - type: IgnorePredictionHit
    - type: Tag
      tags:
        - HideContextMenu

- type: entity
  parent: CMUXenoPsychicShieldSegment
  id: CMUXenoPsychicShield
  categories: [HideSpawnMenu]
  name: psychic shield
  components:
    - type: Sprite
      drawdepth: Effects
      sprite: _CMU14/Effects/Xeno/warlock_shield.rsi
      state: shield
    - type: PointLight
      radius: 2
      energy: 1.5
      color: "#7fb7ff"

