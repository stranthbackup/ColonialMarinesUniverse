# -- RIFLE AMMUNITION BOXES --
#   -- REG 5.56x45mm Rifle Ammunition Box --
- type: entity
  parent: RMCBoxBulletsRifle
  id: CMUBoxBulletsRifle556x45MM
  name: rifle ammunition box (5.56×45mm)
  description: A 5.56×45mm ammunition box. Used to refill M16 magazines. It comes with a leather strap allowing to wear it on the back.
  components:
  - type: Sprite
    layers:
    - state: rifle_box
      color: "#485c63"
    - state: rifle_box_marking
      color: "#7c4c1b"
    - state: rifle_box_generic
      color: "#ffcb26"
    - state: rifle_ammo_full_rounds_base
      map: [ "enum.BulletBoxLayers.Fill" ]
    - state: rifle_ammo_full_rounds_color
      map: [ "enum.BulletBoxLayers2.Fill" ]
      color: "#ffc000"
  - type: BulletBox
    bulletType: CMUBoxBulletsRifle556x45MM

- type: entity
  parent: CMUBoxBulletsRifle556x45MM
  id: CMUBoxBulletsRifle556x45MMEmpty
  suffix: Empty
  components:
