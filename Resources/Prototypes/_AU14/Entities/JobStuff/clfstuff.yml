- type: entity
  parent: RMCJumpsuitCivilian
  id: AU14RMCJumpsuitCivilianCLF
  name: gray utility uniform
  description: A stylish gray jumpsuit, popularly issued to UN contract workers on the frontier. This one has a small earpiece clipped to the collar.
  suffix: CLF
  components:
  - type: UniformAccessoryHolder
    allowedCategories:
    - Tie
    - Patch
    - Medal
    - Armband
    - PridePin
    - Rank
    - Decor
    - Poncho
