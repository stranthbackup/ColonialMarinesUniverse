- type: clfSpawnConfig
  id: CLFSpawnConfig
  # Safehouse markers are fallback CLF spawn points; operational gear is deployed from the Cell Leader's kit.
  additionalItems: []

- type: entity
  parent: RMCBaseEquipmentCase
  id: AU14CLFCellKit
  name: heavy CLF cell kit
  description: A heavy, low-profile field case used to establish a CLF cell hideout.
  components:
  - type: Sprite
    layers:
    - state: closed
      map: [ base ]
    - state: mortar
      map: [ label ]
  - type: RMCDeployable
    deployTime: 12
    deployArea:
      !type:PhysShapeAabb
      bounds: "-2.4,-2.4,2.4,2.4"
    areaBlockedCheck: false
    failIfNotSurface: false
    deploySetups:
    - prototype: RMCComputerIntelCLF
      mode: ReactiveParental
      offset: -1.5, 2
    - prototype: ComputerObjectivesCLF
      offset: -0.5, 2
    - prototype: RMCTechTreeConsoleCLF
      offset: 0.5, 2
    - prototype: CMFaxCLF
      offset: 1.5, 2
    - prototype: AU14AnalyzerMachineCLF
      offset: -1.5, 0
    - prototype: AU14CLFObjectiveWeaponsVendor
      anchor: false
      offset: -0.5, 0
    - prototype: RMCLampTripod
      offset: 0.5, 0
    - prototype: RMCCrateMedicalFirstAid
      offset: 1.5, 0
    - prototype: AU14CrateCivilianClothingRandom
      offset: -1.5, -2
    - prototype: AU14CrateCivilianClothingRandom
      offset: -0.5, -2
    - prototype: AU14CrateCLFinitalTools
      offset: 0.5, -2
    - prototype: AU14CrateCLFRecruitmentKit
      offset: 1.5, -2

- type: entity
  name: Generic Safhouse Marker
  parent: MarkerBase
  id: safehousemarker
  components:
  - type: Sprite
    state: green
  - type: SafehouseMarker
  - type: ScenarioSpawnMarker
    kind: ClfSafehouse
    tags:
    - force:clf:safehouse

- type: entity
  name: Generic CLF Safehouse Spawn Marker
  parent: MarkerBase
  id: scenarioclfsafehousespawnmarker
  components:
  - type: Sprite
    state: green
  - type: ScenarioSpawnMarker
    kind: ClfSafehouse
    tags:
    - force:clf:safehouse

- type: entity
  parent: RMCCrateBase
  id: AU14CrateCLFinitalTools
  name: CLF tool cache
  description: A field cache of weapons, utilities, and repair tools for a newly established CLF cell.
  components:
  - type: Sprite
    state: crate
  - type: StorageFill
    contents:
    - id:  AU14GunCaseRifleMar30
      amount: 2
    - id: RMCGunCasePistolZHNK72
      amount: 1
    - id: RMCGunCasePistolMK80
      amount: 1
    - id: RMCGunCasePistolM44
      amount: 1
    - id: CMPackFlare
      amount: 3
    - id: AU14CMDefibrillator
      amount: 1
    - id: RMCBinocularsCiv
      amount: 2
    - id: AU14BeltUtilityFilled
      amount: 2
    - id: RMCBoxFlashlights
      amount: 2

- type: entity
  parent: RMCCrateBase
  id: AU14CrateCLFRecruitmentKit
  name: CLF recruitment cache
  description: A compact cache for inducting new CLF members and handing out covert cell comms.
  components:
  - type: Sprite
    state: crate
  - type: StorageFill
    contents:
    - id: AU14CLFHeadset
      amount: 5
    - id: RMCCLFArmband
      amount: 5
    - id: CMMaskCoif
      amount: 5
    - id: AU14TattooInkCartridge
      amount: 6
    - id: AU14TattooGun
      amount: 1

- type: entity
  parent: CMFax
  id: CMFaxCLF
  suffix: CLF
  components:
  - type: FaxMachine
    name: "Colony Liberation Front"
    notifyAdmins: true
  - type: CLFFaxReceiver
# Inscribed M44 - Unique CLF Veteran sidearm
- type: entity
  parent: RMCWeaponRevolverM44Custom
  id: AU14WeaponRevolverM44Inscribed
  name: inscribed M44 combat revolver
  description: A well-worn M44 combat revolver with crude inscriptions scratched into the barrel and grip. The words 'FREEDOM OR DEATH' are etched along the side. This weapon has clearly seen many battles.
  components:
  - type: RevolverAmmoProvider
    proto: RMCCartridgeRevolver44
    capacity: 10
    chambers: [ True, True, True, True, True, True, True ]
    ammoSlots: [ null, null, null, null, null, null, null ]
  - type: RMCSelectiveFire
    baseFireRate: 6

- type: entity
  name: Tattoo Gun
  parent: BaseStorageItem
  id: AU14TattooGun
  description: Used to induct people into the CLF.
  components:
  - type: TattooGun
  - type: Sprite
    sprite: _AU14/Objects/Misc/TattooGun/tattoogun.rsi
    layers:
    - state: inkgon
  - type: Storage
    maxItemSize: Normal
    grid:
    - 0,0,1,1
    whitelist:
      tags:
      - TattooInk
  - type: ContainerAmmoProvider
    container: storagebase
  - type: Item
    size: Normal
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []

# Ink cartridge for the tattoo gun
- type: Tag
  id: TattooInk

- type: entity
  parent: BaseItem
  id: AU14TattooInkCartridge
  name: tattoo ink cartridge
  description: A small cartridge of dark ink for use with a tattoo gun.
  components:
  - type: Sprite
    sprite: _AU14/Objects/Misc/TattooGun/tattoogunmag.rsi
    layers:
    - state: inkmag
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: true
    - state: inkmag

  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - TattooInk



- type: entity
  parent: CMJumpsuitColonist
  id: AU14CMJumpsuitColonistCLF
  name: colonist uniform
  description: A stylish gray-green jumpsuit - standard issue for colonists. This one has a small earpiece clipped to the collar.
  suffix: CLF
  components:
  - type: UniformAccessoryHolder
    allowedCategories:
    - Tie
    - Patch
    - Medal
    - Armband
    - PridePin
    - Rank
    - Decor
    - Poncho
    - Mask
    - Utility
    startingAccessories:
