      burn, blast, fragment, and surgical wounds. Mixed wounds on the same limb now
      merge into larger wound records."'
    type: Add
  - message: '"Added 4 wound sizes based on damage: small under 15, deep at 15+, gaping
      at 35+, and massive at 60+."'
    type: Add
  - message: '"Wound sizes now require 1, 2, 3, and 4 treatment uses respectively,
      with 0.5s, 1s, 2s, and 4s base treatment delays."'
    type: Add
  - message: '"Added limb health caps from active wounds and cleanup issues. Small,
      deep, gaping, and massive wounds reduce the field-heal cap by 5%, 12%, 20%,
      and 30% each, clamped to at least 35% limb health."'
    type: Add
  - message: '"Added wound recovery after optimal treatment. Clean optimal wounds
      regenerate linked brute or burn damage at 0.6 damage per second."'
    type: Add
  - message: '"Adequate wound treatment restores limb health only up to the current
      wound cap instead of enabling full recovery."'
    type: Tweak
  - message: '"Added separate external bleeding tiers. Minor, moderate, severe, and
      arterial bleeding drain 0.08, 0.18, 0.35, and 0.70 blood per second."'
    type: Add
  - message: '"Wound bleeding durations are now clamped between 5 and 60 seconds."'
    type: Tweak
  - message: '"Added 5 field-mixing ingredients in 50-unit stacks: coagulant powder,
      antiseptic, burn gel, tissue sealant, and trauma foam."'
    type: Add
  - message: '"Added packed gauze and packed trauma kits as 50-use base stacks."'
    type: Add
  - message: '"Packed gauze instantly controls non-arterial bleeding. Packed trauma
      kits can also control arterial bleeding with a 1 second base delay."'
    type: Tweak
  - message: '"Added 5 prepared gauze stacks with 10 uses each: hemostatic, antiseptic,
      burn gel, sealing, and compression gauze."'
    type: Add
  - message: '"Added 5 prepared trauma dressing stacks with 6 uses each: hemostatic,
      antiseptic, burn, sealing, and compression trauma dressings."'
    type: Add
  - message: '"Prepared gauze is instant and treats 1 wound use per application. Prepared
      trauma dressings treat 2 wound uses per application and can stop arterial bleeding."'
    type: Tweak
  - message: '"Field mixing consumes 1 packed gauze or packed trauma kit use, plus
      ingredient units based on medical skill: 5 units at medical 0-1, 2 units at
      medical 2, and 1 unit at medical 3+."'
    type: Tweak
  - message: '"Updated corpsman vendors with packed gauze for 1 point, packed trauma
      kits for 2 points, ingredients for 4 points each, prepared gauze for 2 points
      each, prepared trauma dressings for 3 points each, and O- blood bags for 4'
    type: Tweak
  - message: '"Added limited rifleman equipment-vendor access: packed gauze 5 points,
      packed trauma kits 8 points, coagulant powder 15 points, burn gel 15 points,
      hemostatic or burn gauze 8 points, and hemostatic or burn trauma dressings'
    type: Tweak
  - message: '"Added ASRS medical purchasables: 20 packed gauze, 16 packed trauma
      kits, 12 of each ingredient, 16 of each prepared gauze, 10 of each prepared
      trauma dressing, 16 full O- blood bags, and 8 empty blood bags."'
    type: Tweak
  - message: '"Updated medical examine and health analyzer data to show wound mechanisms,
      treatment quality, cleanup issues, bleeding state, limb health caps, and ordered
      body-part injury sections."'
    type: Tweak
  - message: '"Added trauma routing numbers for deeper injuries: ballistic trauma
      can hit head organs at 55%, torso organs at 50%, and vascular damage at 3%;
      piercing trauma can hit bones at 20%, organs at 35%, and vascular damage at
      4%."'
    type: Tweak
  - message: '"Surgery now supports condition-driven injected steps and re-arms after
      failed or newly inserted steps instead of dropping the whole procedure flow."'
    type: Tweak
  - message: '"Fixed retained fragments appearing on every wound instead of being
      rare cleanup issues."'
    type: Fix
  - message: '"Restored knife-based retained-fragment removal through the cleanup
      flow."'
    type: Fix
  - message: '"Updated trauma governor, bone-breaking sounds, and medical item interactions
      for the new wound and limb recovery foundation."'
    type: Tweak
