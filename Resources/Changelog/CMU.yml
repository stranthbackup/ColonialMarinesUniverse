      flow.
    type: Add
  - message: Added body targeting hotkeys for head, torso/groin, left arm/hand, right
      arm/hand, left leg/foot, and right leg/foot.
    type: Add
  - message: 'Wound size thresholds did not change from the previous wound profile:
      small below 15 damage, deep at 15+, gaping at 35+, and massive at 60+.'
    type: Tweak
  - message: "Wound treatment changed from \u201Cauto-find and patch wounds\u201D\
      \ to \u201Ctreat the selected body part.\u201D If you target the chest, treatment\
      \ stays on the chest unless a radial selection is needed."
    type: Tweak
  - message: Repeated wound treatment now chains with a 0.2 second repeat delay instead
      of blasting every remaining use instantly.
    type: Tweak
  - message: Base field treatment timing is now 1 second before skill/tool modifiers,
      with chained follow-up uses using the shorter 0.2 second delay.
    type: Tweak
  - message: Old field treatment restored body-part health up to a cap immediately.
      New field treatment stabilizes the wound and starts recovery over time.
    type: Tweak
  - message: Old treated wound healing was 0.6 damage per second. New treated brute
      and burn recovery defaults to 0.375 per second, with stronger tools able to
      raise the recovery rate based on treatment amount.
    type: Tweak
  - message: "Surgical line and synth graft no longer behave like simple \u201Cbetter\
      \ gauze/ointment.\u201D They now repair up to 10 damage, capped by both the\
      \ wound damage and half the current region damage."
    type: Tweak
  - message: Gauze and trauma kits now focus on brute wounds and external bleeding
      on the selected part, rather than globally cleaning up eligible wounds.
    type: Tweak
  - message: Ointment and burn kits now focus on burn wounds on the selected part,
      rather than globally cleaning up eligible burns.
    type: Tweak
  - message: Hemostatic gauze remains a brute wound tool, but now participates in
      the new selected-body-part wound loop.
    type: Tweak
  - message: Trauma kits still treat more serious brute wounds, but the result is
      now stabilization plus recovery instead of instantly pushing the body part back
      to a large HP cap.
    type: Tweak
  - message: Burn kits still treat more serious burn wounds, but no longer allow huge
      burn stacks to collapse instantly from wound clearing.
    type: Tweak
  - message: The previous wound cap behavior could jump a badly damaged body part
      back toward a cap immediately. New recovery is slower and capped by active wound
      recovery, preventing 400 burn from collapsing too aggressively after treatment.
    type: Tweak
  - message: 'External bleeding math changed from duration-based wound bleeding into
      persistent bleed sources. Bleeding now has severity based on rate: trace below
      1, light below 2, moderate below 4, heavy below 6, and critical at 6+.'
    type: Tweak
  - message: External bleeding still starts from brute cut/puncture damage at 5+ damage,
      but it now uses rate-based bleeding at 3.75% of brute damage instead of the
      old timed bleed duration.
    type: Tweak
  - message: 'Old external bleed duration was based on damage type: slash x4 seconds,
      piercing x3 seconds, blunt x1 second, clamped between 5 and 60 seconds. New
      bleeding persists until treated or repaired.'
    type: Tweak
  - message: Internal bleeding changed from a component on a body part into a tracked
      medical condition with scanner/examine/surgery support.
    type: Tweak
  - message: Old severe blunt internal bleeding seeded at 60 blunt damage with 0.3
      bloodloss per second. New internal bleeding comes from vascular trauma, organ/fracture
      complications, surgical mistakes, and movement complications.
    type: Tweak
  - message: 'Vascular trauma internal bleeding now uses mechanism-specific rates:
      ballistic 0.25, piercing 0.30, slash 0.25, and blunt 0.20.'
    type: Tweak
  - message: Closing an incision over unclamped surgical bleeding now converts that
      surgical bleeding into internal bleeding instead of simply making it disappear.
    type: Tweak
  - message: Added surgical bleeding as a distinct state. Open surgery can create
      surgical bleeders, and hemostats are now the intended way to clamp them.
    type: Add
  - message: The old system had wounds and IB, but they were not integrated into one
      coherent surgery flow. They now route into treatment, examine, scanner, surgery,
      bleeding, and recovery consistently.
    type: Tweak
  - message: Added shrapnel as a medical injury that appears on examine/scanner and
      can be removed.
    type: Add
  - message: Shrapnel previously existed as a component-style side feature. It now
      behaves like a wound/foreign object in the medical flow.
    type: Tweak
  - message: Added shrapnel sources from fragmenting projectiles, xeno spikes, bone
      spikes, and large explosions.
    type: Add
  - message: Added explosion shrapnel chance scaling. Explosions start becoming shrapnel-relevant
      around 35% exposure and become nearly guaranteed around 85% exposure.
    type: Add
  - message: Added shrapnel movement pain/damage. Embedded fragments can pulse while
      moving, with movement checks around 0.75 tile accumulated movement and a 1.25
      second pulse cooldown.
    type: Add
  - message: "Fracture names changed. The old top tier was \u201CComminuted\u201D\
      ; it is now \u201CShattered\u201D."
    type: Tweak
  - message: Fracture tiers are now Hairline, Simple, Compound, and Shattered.
    type: Tweak
  - message: 'Fracture severity now comes from roll damage: Hairline below 45, Simple
      at 45+, Compound at 90+, Shattered at 120+.'
    type: Tweak
  - message: 'Fracture roll damage is brute damage x3, and fracture chance is roll
      damage x2 percent. Example: 15 brute becomes 45 roll damage and about 90% fracture
      chance if bone contact happened.'
    type: Tweak
  - message: Compound and Shattered fractures still require surgery, but now also
      affect surgical access rules.
    type: Tweak
  - message: Compound or Shattered chest/head fractures can allow deep access after
      an incision and retraction, so doctors do not always need to cut fresh bone
      access when the bone is already badly broken.
    type: Tweak
  - message: Splints still stabilize fractures, but now they suppress penalties rather
      than acting like full fracture healing.
    type: Tweak
  - message: Splints apply in 3 seconds and handle up to Simple severity.
    type: Tweak
  - message: Casts apply in 6 seconds, handle up to Simple severity, and support post-op
      bone recovery over about 5 minutes.
    type: Tweak
  - message: 'Old fracture movement penalties used direct speed multipliers: Hairline
      0.95, Simple 0.85, Compound 0.70, Comminuted 0.40.'
    type: Tweak
  - message: New movement penalties use lighter slowdown points instead of harsh direct
      multipliers. Broken regions add 0.65 slowdown points, splinted/eschar regions
      add 0.25, and missing regions add 2.5.
    type: Tweak
  - message: 'Pain slowdown was softened. Old pain movement multipliers were Mild
      0.97, Moderate 0.92, Severe 0.85, Shock 0.70. New pain adds slowdown points
      instead: Mild 0.25, Discomforting 0.50, Moderate 0.90, Distressing 1.25, Severe
      1.60, Shock 2.00.'
    type: Tweak
  - message: Movement penalties now distinguish walking from wheelchair use. Walking
      checks feet, legs, chest, groin, and head. Wheelchair checks hands, arms, chest,
      groin, and head.
    type: Tweak
  - message: Added movement complications for untreated fractures and shrapnel, including
      pain feedback and extra damage/IB consequences.
    type: Add
  - message: Old severance used body-part HP with Max 100 and SeveranceThreshold 200,
      meaning severance happened around Max + Threshold, usually 300 brute-eligible
      structural damage.
    type: Tweak
  - message: 'New severance uses direct region brute thresholds: head at 185 brute
      damage, arms/hands/legs/feet at 120 brute damage.'
    type: Tweak
  - message: Fire no longer contributes to traumatic severance. Severance checks brute
      damage only.
    type: Tweak
  - message: Added hand and foot severance. Previously severance was centered around
      larger body parts and did not cleanly support extremities.
    type: Add
  - message: Stump location was corrected. Losing a hand creates a hand/arm stump
      relationship instead of incorrectly pushing the stump to the wrong parent region;
      losing an arm places the stump on the arm/chest relationship as appropriate.
    type: Tweak
  - message: Added stump sealing surgery. Open stumps can now be surgically repaired
      instead of being permanent awkward bleeding states.
    type: Add
  - message: Added biological limb reattachment.
    type: Add
  - message: Added robotic prosthetic limb attachment for arms, hands, legs, and feet.
    type: Add
  - message: Added prosthetic removal surgery.
    type: Add
  - message: Added limb printer recipes for robotic limbs using metal and cable coils.
    type: Add
  - message: Prosthetic limbs no longer behave like biological limbs. They do not
      get normal biological wounds, fractures, or internal bleeding.
    type: Tweak
  - message: Added prosthetic repair using lit welders for brute-style robotic damage
      and cable coils for burn-style robotic damage.
    type: Add
  - message: Synth medical changed heavily. Synths no longer fall through the human
      biological wound path because they spawned human first.
    type: Tweak
  - message: Synths are limited toward brute, burn, severance, prosthetic-style repair,
      and synthetic limb surgery instead of normal bleeding/fracture/organ wound gameplay.
    type: Tweak
  - message: Synth blood and synth damage presentation changed from red human-like
      bleeding to white synthetic-style effects.
    type: Tweak
  - message: Added synthetic limb surgery examine output.
    type: Add
  - message: Added synthetic limb surgery flow with cut chassis, strip wiring, detach,
      attach, and weld chassis steps.
    type: Add
  - message: 'Synthetic limb surgery timings are short: cut chassis 2.5s, strip wiring
      2s, detach 2.5s, attach 3s, weld chassis 2.5s.'
    type: Tweak
  - message: Old surgery was prototype/UI-driven and often locked into unavailable
      procedure states. New surgery mode is tool-driven and routes from the current
      incision/body state.
    type: Tweak
  - message: Added surgery mode feedback so enabling/disabling surgery mode is visible.
    type: Add
  - message: 'Surgery now has explicit incision stages: closed, open skin, retracted,
      and deep access.'
    type: Tweak
  - message: 'Standard incision management timings are now roughly: scalpel open 2s,
      hemostat clamp 2s, retractor retract 2s, saw/drill deep access 3s, bone access
      repair 3s, cautery close 2.5s.'
    type: Tweak
  - message: Limb and extremity repairs can generally be done through shallow/retracted
      access, while chest/head organ work requires deeper access unless an existing
      compound/shattered fracture gives access.
    type: Tweak
  - message: Internal bleeding repair uses fix-o-vein as a surgery tool instead of
      a normal treatment item.
    type: Tweak
  - message: Internal bleeding repair surgery takes 5 seconds.
    type: Tweak
  - message: Stump repair surgery takes 2 seconds once the correct access and tool
      are available.
    type: Tweak
  - message: 'Foreign object removal now has separate depth handling: non-surgical
      removal around 3 seconds, surgical removal around 4 seconds.'
    type: Tweak
  - message: Eschar removal takes about 3 seconds and now has its own surgery routing.
    type: Tweak
  - message: Added a changed alien embryo removal surgery.
    type: Add
  - message: Added a changed eye surgery.
    type: Add
  - message: Added a changed brain damage surgery.
    type: Add
  - message: Added a changed deliberate amputation surgery.
    type: Add
  - message: Amputation now has an explicit path and a cancellation route with a surgical
      line instead of trapping the surgeon in the wrong procedure.
    type: Tweak
  - message: Amputation includes muscle severing and limb removal steps, both around
      4 seconds.
    type: Tweak
  - message: Added surgery pain failures. Conscious patients without enough pain control
      can scream and shake when surgery fails.
    type: Add
  - message: Added anesthesia support through mask plus anesthetic tank, allowing
      proper surgery sleep setup.
    type: Add
  - message: Health analyzer output changed from broad always-visible body/organ lists
      into damaged-body-part and damaged-organ focused readouts.
    type: Tweak
  - message: Body scanner surgery assist now gives a 0.5 surgery delay multiplier
      after successful calibration.
    type: Tweak
  - message: Body scanner minigame requirement was reduced to about 2 slices for faster
      surgery assist setup.
    type: Tweak
  - message: Autodoc was moved from old surgery behavior to the new surgery flow while
      keeping its general machine role.
    type: Tweak
  - message: Autodoc procedure timing was lowered; queued steps now use shorter automated
      procedure durations instead of the old long stuck-feeling repair flow.
    type: Tweak
  - message: Removed trauma governor gameplay. The old stabilizer UI and trauma governor
      flow are gone.
    type: Remove
  - message: Removed medical field crafting and field mixing. Coagulant powder, antiseptic,
      burn gel, tissue sealant, trauma foam, packed gauze, packed trauma dressings,
      and prepared dressing recipes were removed from the active medical loop.
    type: Remove
  - message: Removed old wound compatibility behavior that could keep old wound components
      alive beside the new wound behavior.
    type: Remove
  - message: Removed old body-part HP as the active medical authority.
    type: Remove
  - message: Removed old bone/fracture components as the active fracture authority.
    type: Remove
  - message: Removed old organ health components as the active organ-damage authority.
    type: Remove
  - message: Removed old condition-driven surgery UI/flow as the active surgery system.
    type: Remove
  - message: "Fixed surgery steps completing the do-after and then saying \u201Csurgery\
      \ is no longer available.\u201D"
    type: Fix
  - message: Fixed surgery mode toggling multiple times from one press.
    type: Fix
  - message: Fixed incision state not showing useful feedback.
    type: Fix
  - message: Fixed hemostat/retractor/scalpel conflicts between incision flow, eschar
      removal, stump sealing, and amputation.
    type: Fix
  - message: Fixed stump sealing being blocked because the limb was missing.
    type: Fix
  - message: Fixed reattached limbs leaving the targeting HUD/body state mismatched.
    type: Fix
  - message: Fixed robotic limb attachment not restoring hand use.
    type: Fix
  - message: Fixed robotic limbs appearing as severed/missing on scanner or examine.
    type: Fix
  - message: Fixed synthetic repairs not working consistently between roundstart synths
      and spawned synths.
    type: Fix
  - message: Fixed shrapnel not showing as a real injury.
    type: Fix
  - message: Fixed large explosions and fragment projectiles not creating medical
      shrapnel reliably.
    type: Fix
  - message: Fixed blood decals spawning offset from the body.
    type: Fix
  - message: Fixed blood footprints and dragging trails using the wrong blood color.
    type: Fix
  - message: Fixed synthetic blood effects spawning too often.
    type: Fix
  - message: Fixed eschar disappearing when opening incisions.
    type: Fix
  - message: Fixed organ damage from torso hits routing too heavily into lungs.
    type: Fix
  - message: Fixed decapitation not handling headgear, masks, glasses, ears, and headset
      items correctly.
    type: Fix
  - message: Fixed severed heads not being named after their original owner.
    type: Fix
  - message: Optimized medical processing so healthy bodies are not constantly processed
      by expensive medical loops.
    type: Code
  - message: Optimized medical networking so HUDs and scanners use compact summary
      data unless detailed medical data is requested.
    type: Code
  - message: Optimized repeated treatment, bleeding, surgery, scanner, and pain updates
      to reduce repeated work during mass-casualty combat.
    type: Code
